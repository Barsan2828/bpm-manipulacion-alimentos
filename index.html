<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificación Manipulación de Alimentos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f5f7fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#0c3c60;
color:white;
border:none;
padding:15px 30px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#072c47;
}

.video iframe{
width:100%;
height:450px;
}

#pago{
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Registro de Estudiante</h2>

<input id="nombre" placeholder="Nombre completo">

<input id="cedula" placeholder="Cédula">

<input id="email" placeholder="Correo electrónico">

<input id="telefono" placeholder="Teléfono">

<button onclick="registrar()">Continuar</button>

</div>

<div class="card video">

<h2>Video Capacitación</h2>

<iframe src="https://www.youtube.com/embed/1lq5lVg2jS0"></iframe>

</div>

<div class="card">

<h2>Evaluación BPM</h2>

<p>¿Qué significa BPM?</p>

<input type="radio" name="q1" value="1"> Buen proceso mejorado<br>
<input type="radio" name="q1" value="correct"> Buenas prácticas de manufactura<br>

<br>

<button onclick="evaluar()">Enviar Evaluación</button>

<p id="resultado"></p>

</div>

<div class="card" id="pago">

<h2>Pago de Certificación</h2>

<p>Realiza el pago por Nequi:</p>

<h3>3228129237</h3>

<button onclick="window.open('https://wa.me/573228129237')">

Enviar comprobante

</button>

</div>

</div>

<script>

function registrar(){

alert("Registro guardado")

}

function evaluar(){

let correctas = document.querySelectorAll('input[value="correct"]:checked').length

if(correctas>=1){

document.getElementById("resultado").innerHTML="Aprobaste"

document.getElementById("pago").style.display="block"

}

else{

document.getElementById("resultado").innerHTML="No aprobaste"

}

}

</script>

</body>
</html>
